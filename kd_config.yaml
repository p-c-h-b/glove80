# keymap-drawer theme for the Glove80 keymap diagram (dark, keycap-style).
parse_config:
  # Show symbols instead of words for common keys.
  zmk_keycode_map:
    BSPC: "⌫"
    DEL: "⌦"
    RET: "⏎"
    ENTER: "⏎"
    TAB: "⇥"
    SPACE: "␣"
    ESC: "⎋"
    CAPS: "⇪"
    LEFT: "←"
    RIGHT: "→"
    UP: "↑"
    DOWN: "↓"
    PG_UP: "⇞"
    PG_DN: "⇟"
    HOME: "⇱"
    END: "⇲"
    LSHFT: "⇧"
    RSHFT: "⇧"
    LCTRL: "⌃"
    RCTRL: "⌃"
    LALT: "⌥"
    RALT: "⌥"
    LGUI: "◆"
    RGUI: "◆"
    # digits
    N0: "0"
    N1: "1"
    N2: "2"
    N3: "3"
    N4: "4"
    N5: "5"
    N6: "6"
    N7: "7"
    N8: "8"
    N9: "9"
    # punctuation / symbols — show the glyph, not the name
    GRAVE: "`"
    TILDE: "~"
    MINUS: "-"
    EQUAL: "="
    UNDER: "_"
    PLUS: "+"
    LBKT: "["
    RBKT: "]"
    LBRC: "{"
    RBRC: "}"
    LPAR: "("
    RPAR: ")"
    BSLH: "\\"
    PIPE: "|"
    FSLH: "/"
    SEMI: ";"
    COLON: ":"
    SQT: "'"
    DQT: "\""
    COMMA: ","
    DOT: "."
    QMARK: "?"
    EXCL: "!"
    AT: "@"
    HASH: "#"
    DLLR: "$"
    PRCNT: "%"
    CARET: "^"
    AMPS: "&"
    ASTRK: "*"

  # Show the real glyph for macros/morphs (and tidy the mouse layer) instead of
  # the behavior name.
  raw_binding_map:
    # WORLD accents — tap = lowercase macro, shifted = uppercase macro
    "&w_ae": "ä"
    "&wu_ae": "Ä"
    "&w_oe": "ö"
    "&wu_oe": "Ö"
    "&w_ue": "ü"
    "&wu_ue": "Ü"
    "&w_ie": "ï"
    "&wu_ie": "Ï"
    "&w_ea": "é"
    "&wu_ea": "É"
    "&w_aa": "á"
    "&wu_aa": "Á"
    "&w_nn": "ñ"
    "&wu_nn": "Ñ"
    "&w_cc": "ç"
    "&wu_cc": "Ç"
    "&w_ss": "ß"
    "&w_eur": "€"
    "&w_gbp": "£"
    "&w_tm": "™"
    "&w_cp": "©"
    # MOUSE layer
    "&mkp LCLK": "L click"
    "&mkp MCLK": "M click"
    "&mkp RCLK": "R click"
    "&msc SCRL_UP": "scrl ↑"
    "&msc SCRL_DOWN": "scrl ↓"
    "&msc SCRL_LEFT": "scrl ←"
    "&msc SCRL_RIGHT": "scrl →"
    "&mmv MOVE_UP": "move ↑"
    "&mmv MOVE_DOWN": "move ↓"
    "&mmv MOVE_LEFT": "move ←"
    "&mmv MOVE_RIGHT": "move →"
    "&kp PAUSE_BREAK": "ball ⇅"
    # caps word + magic key labels
    "&caps_word": "capsw"
    "&magic MAGIC 0": "magic"
    "&magic 5 0": "magic"
    "&rgb_ug_status_macro": "magic"

draw_config:
  draw_key_sides: true          # 3D keycap look
  key_h: 58
  append_colon_to_layer_header: false
  dark_mode: false              # we force a dark palette below
  svg_extra_style: |
    /* ---- canvas + fonts ---- */
    svg.keymap { background-color: #0d1117; }
    text { fill: #e6edf3; font-family: "Inter", "DejaVu Sans", "Noto Sans", sans-serif; }
    /* ASCII layer header: DejaVu renders cleanly in Inkscape (Inter bold smears) */
    text.label { fill: #ffffff; stroke: #0d1117; stroke-width: 3; paint-order: stroke;
                 font-weight: 700; font-size: 18px; font-family: "DejaVu Sans", sans-serif; }
    /* ---- keys: medium-dark so legends read well on the black canvas ---- */
    rect.key, rect.combo { fill: #2b313c; stroke: #3d4452; stroke-width: 1; }
    rect.key.side { fill: #1c2129; }
    text.tap { fill: #f2f5f9; font-weight: 600; }
    text.hold { fill: #9db4ff; }
    text.shifted { fill: #bcc5d2; }
    text.trans { fill: #5b6573; }
    /* ---- layer-activator / held keys: amber ---- */
    rect.key.held { fill: #e0af68; stroke: #c08a3e; }
    rect.key.held.side { fill: #b5832f; }
    .held text.tap, .held text.hold, .layer-activator text.hold { fill: #1b1f27; font-weight: 700; }
    /* ---- per-layer tints (lighter; held keys stay amber) ---- */
    g.layer-num   rect.key { fill: #21384a; }
    g.layer-fun   rect.key { fill: #36294c; }
    g.layer-mouse rect.key { fill: #20492f; }
    g.layer-world rect.key { fill: #4a3621; }
    g.layer-magic rect.key { fill: #471f35; }
    g.layer-num   rect.key.held, g.layer-fun rect.key.held,
    g.layer-mouse rect.key.held, g.layer-world rect.key.held,
    g.layer-magic rect.key.held { fill: #e0af68; }
